version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-et_id_ocr}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile.nextjs
      args:
        APP_NAME: web
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-et_id_ocr}?schema=public
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      BOT_SECRET: ${BOT_SECRET}
      BOT_INTERNAL_URL: http://bot:5005
    depends_on:
      - db
    ports:
      - "3000:3000"

  admin:
    build:
      context: .
      dockerfile: Dockerfile.nextjs
      args:
        APP_NAME: admin
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-et_id_ocr}?schema=public
      BOT_SECRET: ${BOT_SECRET}
    depends_on:
      - db
    ports:
      - "3001:3001"

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-et_id_ocr}?schema=public
      BOT_SECRET: ${BOT_SECRET}
    depends_on:
      - db
    ports:
      - "5005:5005"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-et_id_ocr}?schema=public
      BOT_SECRET: ${BOT_SECRET}
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - web
      - admin

volumes:
  postgres_data:
