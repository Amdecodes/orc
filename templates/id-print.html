<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fff;
  }

  .canvas {
    position: relative;
    width: 5937px;
    height: 1735px;
    background: white;
  }

  .front {
    position: absolute;
    left: 247px;
    top: 56px;
    width: 2598px;
    height: 1622px;
  }

  .back {
    position: absolute;
    left: 3092px; /* 247+2598+247 */
    top: 56px;
    width: 2598px;
    height: 1622px;
  }

  .front img,
  .back img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="front">
      <img src="{{FRONT_IMAGE}}" />
    </div>

    <div class="back">
      <img src="{{BACK_IMAGE}}" />
    </div>
  </div>
</body>
</html>
